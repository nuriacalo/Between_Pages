name: between_pages
description: "App de gestión de lecturas - libros, fanfiction y manga"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.5.0+1
  json_annotation: ^4.9.0
  shared_preferences: ^2.2.3
  flutter_riverpod: ^2.5.1
  go_router: ^17.2.0
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.4.1
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0
  intl: ^0.20.2
  google_fonts: ^6.2.1
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true